<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Filterable JavaZone 2025 program with saved favorites and conflict-aware my-schedule view.">
<title>JavaZone 2025 — Program</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">JZ</span>
    <div>
      <h1>JavaZone 2025</h1>
      <p class="subtitle">Full program &middot; works offline once loaded</p>
    </div>
  </div>
  <nav class="view-tabs" role="tablist" aria-label="Program view">
    <button class="view-tab active" type="button" data-view="schedule" role="tab" aria-selected="true">Program</button>
    <button class="view-tab" type="button" data-view="my-schedule" role="tab" aria-selected="false">
      My schedule <span id="fav-count" class="badge">0</span>
    </button>
  </nav>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <input id="search-input" type="search" placeholder="Search talks, speakers, keywords…" aria-label="Search sessions">
  </div>
  <button id="filter-toggle" class="filter-btn" type="button" aria-expanded="false" aria-controls="filter-panel">
    Filters <span id="filter-count" class="badge hidden">0</span>
  </button>
</div>

<div id="day-tabs" class="day-tabs" role="tablist" aria-label="Conference day" hidden></div>

<div id="filter-panel" class="filter-panel" hidden></div>

<main id="content" class="content" aria-live="polite">
  <p class="status">Loading program…</p>
</main>

<footer class="app-footer">
  <p>Data from <a href="https://sleepingpill.javazone.no/public/allSessions/javazone_2025" target="_blank" rel="noopener">sleepingpill.javazone.no</a>. Favorites are stored only in your browser.</p>
</footer>

<script src="app.js"></script>
</body>
</html>
